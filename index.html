<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frenzy Login - Dark Mode</title>
    <link rel="stylesheet" href="style.css">
<!-- Material Symbols ikonkalari uchun link (bunga tegmang) -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

<!-- Sizning CSS faylingiz uchun to'g'irlangan link -->
<link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="brand-header">
    <!-- Logotip uchun blok -->
    <div class="logo-wrapper">
        <div class="fz-logo-box">
            <span>FZ</span>
        </div>
    </div>
    <h1 class="frenzy-title">FRENZY</h1>
    <h2 class="login-heading">Войти в Frenzy</h2>
</div>
    <div class="login-card">
        <header class="header">
            <span class="fz">FZ</span>
            <h1 class="brand-name">FRENZY</h1>
            <h2 class="login-text">Войти в Frenzy</h2>
        </header>

        <form class="login-form">
            <div class="input-field active">
                <span class="material-symbols-outlined icon">alternate_email</span>
                <div class="input-column">
                    <label>Имя пользователя, номер мобильного телефона или электронный ад...</label>
                    <input type="email" value="yjasur039@gmail.com">
                </div>
            </div>

            <div class="input-field">
                <div class="input-column">
                    <label>Пароль</label>
                    <input type="password" value="12345678">
                </div>
                <span class="material-symbols-outlined icon">visibility</span>
            </div>

            <button type="submit" class="login-btn">Войти</button>

            <a href="#" class="forgot-pwd">Забыли пароль?</a>

            <div class="divider-line"></div>

            <button type="button" class="fb-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="fb" width="18">
                Войти через Facebook
            </button>

            <button type="button" class="create-acc-btn">Создать новый аккаунт</button>
        </form>

        <footer class="footer">
            <div class="footer-divider"></div>
            <p class="meta-txt">Powered by Meta AI</p>
            <p class="tomorrow-txt">BUILDING TOMORROW TOGETHER</p>
        </footer>
    </div>
</body>
</html>
